<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Mustang, Canberra. A Journey Through Nepalese Taste and Spirit</title>
    <meta
      name="description"
      content="Nepalese restaurant and bar at 4 Farrer Place, Farrer ACT. Hand-pleated momo, Himalayan spice and a bar that leans in. Open 7 nights, 5:00pm to 9:30pm. Reserve a table."
    />
    <meta property="og:title" content="The Mustang, Canberra" />
    <meta property="og:description" content="One momo, magnified. A scroll-driven journey through Nepalese taste and spirit. Reserve a table." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" id="meta-theme-color" content="#14181d" />
    <script>
      (function () {
        var t = null;
        try {
          t = localStorage.getItem("mustang-theme");
        } catch (e) {}
        if (t !== "dark" && t !== "light") {
          t =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
        var m = document.getElementById("meta-theme-color");
        if (m) m.setAttribute("content", t === "light" ? "#f4ede0" : "#14181d");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Inter+Tight:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    />
